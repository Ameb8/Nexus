<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Equilateral triangle with mirrored dividing lines</title>
<desc>An equilateral triangle with 12 sets of lines mirrored across all three sides, creating a symmetric internal pattern. Outer border is thick, inner lines are thin.</desc>
<defs>
  <clipPath id="tri-clip">
    <polygon points="340,50 46,572 634,572"/>
  </clipPath>
  <style>
    .inner-line { stroke: #4a6fa5; stroke-opacity: 0.55; stroke-width: 0.9; fill: none; }
    .outer-border { stroke: #1a2e4a; stroke-width: 3.5; fill: none; }
    @media (prefers-color-scheme: dark) {
      .inner-line { stroke: #7aafdd; stroke-opacity: 0.6; }
      .outer-border { stroke: #a8c8f0; }
    }
  </style>
</defs>

<g clip-path="url(#tri-clip)">

