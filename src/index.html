<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Territory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --p1:       #E8603A;
    --p1-light: #FAD4C6;
    --p1-mid:   #F0997B;
    --p1-dark:  #8B2E10;
    --p2:       #2B7FCC;
    --p2-light: #BDD9F5;
    --p2-mid:   #6FB0E8;
    --p2-dark:  #0C3E70;
    --p3:       #3A9E5F;
    --p3-light: #B8E8CB;
    --p3-mid:   #74CC96;
    --p3-dark:  #164D2B;
    --bg:       #0f1117;
    --surface:  #181c27;
    --surface2: #1f2435;
    --border:   #2a3050;
    --text:     #e8eaf0;
    --muted:    #6b7290;
    --neutral:  #232840;
    --neutral-stroke: #3a4265;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }

  header p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .game-wrap {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* --- Scoreboard --- */
  #scoreboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .player-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .player-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .player-card.p0::before { background: linear-gradient(135deg, rgba(232,96,58,0.12) 0%, transparent 60%); }
  .player-card.p1::before { background: linear-gradient(135deg, rgba(43,127,204,0.12) 0%, transparent 60%); }
  .player-card.p2::before { background: linear-gradient(135deg, rgba(58,158,95,0.12) 0%, transparent 60%); }

  .player-card.active-turn {
    border-color: var(--pc);
    box-shadow: 0 0 0 1px var(--pc), inset 0 0 20px rgba(255,255,255,0.03);
  }
  .player-card.active-turn::before { opacity: 1; }

  .player-card.p0 { --pc: var(--p1); }
  .player-card.p1 { --pc: var(--p2); }
  .player-card.p2 { --pc: var(--p3); }

  .p-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    vertical-align: middle;
    margin-bottom: 1px;
  }

  .p-name {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
  }

  .p-count {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }

  .p-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* --- Turn bar --- */
  #turn-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    min-height: 44px;
  }

  #board-select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    min-width: 128px;
  }

  #turn-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  #turn-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  #turn-label {
    color: var(--text);
    font-size: 12px;
  }

  #reset-btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #reset-btn:hover { background: #283050; border-color: #4a5580; }
  #reset-btn:active { transform: scale(0.97); }

  /* --- SVG container --- */
  #svg-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    line-height: 0;
  }

  #tri-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .tri-cell {
    cursor: default;
    transition: fill 0.1s, opacity 0.1s;
  }

  /* --- Win overlay --- */
  #win-overlay {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  #win-overlay.show { display: block; }

  #win-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  #win-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* --- Legend --- */
  .legend {
    display: flex;
    gap: 16px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0 2px;
    align-items: center;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch {
    width: 12px; height: 12px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<header>
  <h1>Triangle Territory</h1>
  <p>Capture cells · Enclose regions · Dominate the triangle</p>
</header>

<div class="game-wrap">
  <div id="scoreboard">
    <div class="player-card p0" id="card-0">
      <div class="p-name"><span class="p-dot" style="background:var(--p1)"></span>Player 1</div>
      <div class="p-count" id="cnt-0">1</div>
      <div class="p-label">cells</div>
    </div>
    <div class="player-card p1" id="card-1">
      <div class="p-name"><span class="p-dot" style="background:var(--p2)"></span>Player 2</div>
      <div class="p-count" id="cnt-1">1</div>
      <div class="p-label">cells</div>
    </div>
    <div class="player-card p2" id="card-2">
      <div class="p-name"><span class="p-dot" style="background:var(--p3)"></span>Player 3</div>
      <div class="p-count" id="cnt-2">1</div>
      <div class="p-label">cells</div>
    </div>
  </div>

  <div id="turn-bar">
    <div id="turn-indicator">
      <span id="turn-dot" style="background:var(--p1)"></span>
      <span id="turn-label">Player 1's turn — click a highlighted cell to expand</span>
    </div>
    <select id="board-select" aria-label="Board"></select>
    <button id="reset-btn" onclick="resetGame()">↺ Reset</button>
  </div>

  <div id="svg-container">
    <svg id="tri-svg" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
      <defs><clipPath id="tri-clip"><polygon points="340,50 46,572 634,572"/></clipPath></defs>
      <g id="cells-layer" clip-path="url(#tri-clip)"></g>
      <polygon points="340,50 46,572 634,572" fill="none" stroke="#3a4a6a" stroke-width="3"/>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(232,96,58,0.5)"></div>Player 1 territory</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(43,127,204,0.5)"></div>Player 2 territory</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(58,158,95,0.5)"></div>Player 3 territory</div>
    <div class="legend-item" style="margin-left:auto"><div class="legend-swatch" style="background:rgba(255,255,255,0.15)"></div>Valid moves</div>
  </div>

  <div id="win-overlay">
    <div id="win-title"></div>
    <div id="win-sub"></div>
  </div>
</div>

<script>
const PLAYERS = [
  { name:'Player 1', fill:'#F0997B', fillDark:'#7A2E10', stroke:'#E8603A', frontier:'rgba(232,96,58,0.35)', frontierStroke:'#E8603A', hex:'#E8603A' },
  { name:'Player 2', fill:'#6FB0E8', fillDark:'#0C3E70', stroke:'#2B7FCC', frontier:'rgba(43,127,204,0.35)', frontierStroke:'#2B7FCC', hex:'#2B7FCC' },
  { name:'Player 3', fill:'#74CC96', fillDark:'#164D2B', stroke:'#3A9E5F', frontier:'rgba(58,158,95,0.35)', frontierStroke:'#3A9E5F', hex:'#3A9E5F' },
];

const NEUTRAL_FILL   = '#232840';
const NEUTRAL_STROKE = '#3a4265';
const BOARD_MANIFEST_URL = '../boards/boards.json';
const BOARD_DIR = '../boards/';

// ---- Geometry helpers ----
function clipHalf(poly,ax,ay,bx,by){
  if(!poly.length)return[];
  const out=[],ins=(px,py)=>(bx-ax)*(py-ay)-(by-ay)*(px-ax)>=0;
  for(let i=0;i<poly.length;i++){
    const[sx,sy]=poly[i],[ex,ey]=poly[(i+1)%poly.length];
    const si=ins(sx,sy),ei=ins(ex,ey);
    if(si)out.push([sx,sy]);
    if(si!==ei){const t=((ax-sx)*(by-ay)-(ay-sy)*(bx-ax))/((ex-sx)*(by-ay)-(ey-sy)*(bx-ax));out.push([sx+t*(ex-sx),sy+t*(ey-sy)]);}
  }
  return out;
}
function clipLine(poly,ax,ay,bx,by){return[clipHalf(poly,ax,ay,bx,by),clipHalf(poly,bx,by,ax,ay)];}
function area(pts){let a=0;for(let i=0;i<pts.length;i++){const[x1,y1]=pts[i],[x2,y2]=pts[(i+1)%pts.length];a+=x1*y2-x2*y1;}return Math.abs(a)/2;}
function centroid(pts){let cx=0,cy=0;for(const[x,y]of pts){cx+=x;cy+=y;}return[cx/pts.length,cy/pts.length];}

const TRI=[[340,50],[46,572],[634,572]];
let boardLines=[];
let unique=[];
let N=0;
let adj=[];
let cornerIdx=[];
let cellEls=[];
let owner=[];
let currentPlayer=0;
let gameOver=false;

function buildCells(lines){
  let polys=[TRI];
  for(const[p1,p2]of lines){
    const next=[];
    for(const poly of polys){
      const[a,b]=clipLine(poly,p1[0],p1[1],p2[0],p2[1]);
      if(a.length>=3&&area(a)>0.5)next.push(a);
      if(b.length>=3&&area(b)>0.5)next.push(b);
    }
    polys=next;
  }
  const filtered=polys.filter(p=>area(p)>4);
  const unique=[];
  for(const c of filtered){
    const[cx,cy]=centroid(c);
    if(!unique.some(u=>{const[ux,uy]=centroid(u);return Math.abs(cx-ux)<2&&Math.abs(cy-uy)<2;}))unique.push(c);
  }
  return unique;
}

function shareEdge(a,b){
  let s=0;
  for(const[ax,ay]of a)for(const[bx,by]of b){if(Math.abs(ax-bx)<2.5&&Math.abs(ay-by)<2.5)s++;if(s>=2)return true;}
  return false;
}

// Corners → starting cell indices
const CORNERS=[[340,50],[46,572],[634,572]];

// ---- SVG setup ----
const cellsLayer=document.getElementById('cells-layer');
const boardSelect=document.getElementById('board-select');

function extractBoardLines(svgText){
  const doc=new DOMParser().parseFromString(svgText,'image/svg+xml');
  const parserError=doc.querySelector('parsererror');
  if(parserError)throw new Error('Could not parse board SVG.');
  const dividerEls=doc.querySelectorAll('line.inner-line');
  const sourceLines=dividerEls.length?dividerEls:doc.querySelectorAll('line');
  const lines=[...sourceLines].map(line=>[
    [Number(line.getAttribute('x1')),Number(line.getAttribute('y1'))],
    [Number(line.getAttribute('x2')),Number(line.getAttribute('y2'))],
  ]);
  if(!lines.length)throw new Error('Board SVG must contain divider <line> elements.');
  if(lines.some(pair=>pair.flat().some(value=>Number.isNaN(value)))){
    throw new Error('Board SVG contains a divider line with invalid coordinates.');
  }
  return lines;
}

function buildBoard(lines){
  boardLines=lines;
  unique=buildCells(boardLines);
  N=unique.length;
  adj=Array.from({length:N},()=>[]);
  for(let i=0;i<N;i++)for(let j=i+1;j<N;j++)if(shareEdge(unique[i],unique[j])){adj[i].push(j);adj[j].push(i);}
  cornerIdx=CORNERS.map(([cx,cy])=>{
    let best=-1,bestD=Infinity;
    for(let i=0;i<N;i++)for(const[px,py]of unique[i]){const d=Math.abs(px-cx)+Math.abs(py-cy);if(d<bestD){bestD=d;best=i;}}
    return best;
  });

  cellsLayer.replaceChildren();
  cellEls=[];
  for(let i=0;i<N;i++){
    const pts=unique[i].map(([x,y])=>`${x.toFixed(2)},${y.toFixed(2)}`).join(' ');
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points',pts);
    p.setAttribute('class','tri-cell');
    p.addEventListener('click',()=>handleClick(i));
    cellsLayer.appendChild(p);
    cellEls.push(p);
  }
}

async function loadBoard(board){
  boardSelect.disabled=true;
  document.getElementById('reset-btn').disabled=true;
  try{
    const res=await fetch(BOARD_DIR+board.file);
    if(!res.ok)throw new Error(`Could not load ${board.file}.`);
    const svgText=await res.text();
    buildBoard(extractBoardLines(svgText));
    resetGame();
  }catch(err){
    gameOver=true;
    document.getElementById('turn-label').textContent=err.message;
    console.error(err);
  }finally{
    boardSelect.disabled=false;
    document.getElementById('reset-btn').disabled=false;
  }
}

async function initBoards(){
  const res=await fetch(BOARD_MANIFEST_URL);
  if(!res.ok)throw new Error('Could not load board manifest.');
  const boards=await res.json();
  if(!Array.isArray(boards)||!boards.length)throw new Error('Board manifest must contain at least one board.');
  boardSelect.replaceChildren(...boards.map(board=>{
    const option=document.createElement('option');
    option.value=board.id;
    option.textContent=board.name;
    return option;
  }));
  boardSelect.addEventListener('change',()=>{
    const board=boards.find(candidate=>candidate.id===boardSelect.value);
    if(board)loadBoard(board);
  });
  await loadBoard(boards[0]);
}

function getFrontier(p){
  const f=new Set();
  for(let i=0;i<N;i++)if(owner[i]===p)for(const nb of adj[i])if(owner[nb]===-1)f.add(nb);
  return f;
}

function findEnclosed(p){
  const neutralSet=new Set();
  for(let i=0;i<N;i++)if(owner[i]===-1)neutralSet.add(i);
  if(!neutralSet.size)return[];
  const visited=new Set();
  const enclosed=[];
  for(const start of neutralSet){
    if(visited.has(start))continue;
    const comp=[],queue=[start],inQ=new Set([start]);
    while(queue.length){
      const cur=queue.shift();
      comp.push(cur);visited.add(cur);
      for(const nb of adj[cur])if(neutralSet.has(nb)&&!inQ.has(nb)){inQ.add(nb);queue.push(nb);}
    }
    const touchingPlayers=new Set();
    for(const c of comp){
      for(const nb of adj[c]){
        if(owner[nb]!==-1)touchingPlayers.add(owner[nb]);
      }
    }
    if(touchingPlayers.size===1&&touchingPlayers.has(p)){
      for(const c of comp)enclosed.push(c);
    }
  }
  return enclosed;
}

function applyEnclosures(p){
  let changed=false;
  const enc=findEnclosed(p);
  if(enc.length){for(const c of enc)owner[c]=p;changed=true;}
  if(changed)applyEnclosures(p);
}

function nextTurn(){
  for(let i=1;i<=3;i++){
    const next=(currentPlayer+i)%3;
    if(getFrontier(next).size>0){currentPlayer=next;return;}
  }
  gameOver=true;
}

function handleClick(idx){
  if(gameOver)return;
  if(!getFrontier(currentPlayer).has(idx))return;
  owner[idx]=currentPlayer;
  applyEnclosures(currentPlayer);
  if(owner.every(o=>o!==-1))gameOver=true;
  else nextTurn();
  render();
}

function render(){
  const frontier=gameOver?new Set():getFrontier(currentPlayer);
  for(let i=0;i<N;i++){
    const el=cellEls[i];
    const p=owner[i];
    if(p!==-1){
      const c=PLAYERS[p];
      el.style.fill=c.fill;
      el.style.stroke=c.stroke;
      el.style.strokeWidth='1px';
      el.style.strokeOpacity='0.7';
      el.style.opacity='1';
      el.style.cursor='default';
    } else if(!gameOver&&frontier.has(i)){
      const c=PLAYERS[currentPlayer];
      el.style.fill=c.frontier;
      el.style.stroke=c.frontierStroke;
      el.style.strokeWidth='1.5px';
      el.style.strokeOpacity='1';
      el.style.opacity='1';
      el.style.cursor='pointer';
    } else {
      el.style.fill=NEUTRAL_FILL;
      el.style.stroke=NEUTRAL_STROKE;
      el.style.strokeWidth='0.8px';
      el.style.strokeOpacity='1';
      el.style.opacity=gameOver?'0.5':'0.6';
      el.style.cursor='default';
    }
  }

  for(let p=0;p<3;p++){
    document.getElementById('cnt-'+p).textContent=owner.filter(o=>o===p).length;
    document.getElementById('card-'+p).classList.toggle('active-turn',p===currentPlayer&&!gameOver);
  }

  const dot=document.getElementById('turn-dot');
  const lbl=document.getElementById('turn-label');
  const overlay=document.getElementById('win-overlay');

  if(gameOver){
    const scores=[0,1,2].map(p=>({p,n:owner.filter(o=>o===p).length})).sort((a,b)=>b.n-a.n);
    overlay.classList.add('show');
    if(scores[0].n===scores[1].n){
      dot.style.background='#666';
      lbl.textContent="Game over — it's a tie!";
      document.getElementById('win-title').textContent="It's a tie!";
      document.getElementById('win-title').style.color=var_p(null);
    } else {
      const w=PLAYERS[scores[0].p];
      dot.style.background=w.hex;
      lbl.textContent=`Game over — ${w.name} wins!`;
      const wt=document.getElementById('win-title');
      wt.textContent=`${w.name} wins! ${scores[0].n} cells`;
      wt.style.color=w.hex;
    }
    document.getElementById('win-sub').textContent=
      scores.map(s=>`${PLAYERS[s.p].name}: ${s.n}`).join(' · ');
  } else {
    overlay.classList.remove('show');
    const c=PLAYERS[currentPlayer];
    dot.style.background=c.hex;
    lbl.textContent=`${c.name}'s turn — click a highlighted cell`;
  }
}

function var_p(){ return '#888'; }

function resetGame(){
  if(!N)return;
  owner=new Array(N).fill(-1);
  currentPlayer=0;
  gameOver=false;
  cornerIdx.forEach((ci,pi)=>{owner[ci]=pi;});
  document.getElementById('win-overlay').classList.remove('show');
  render();
}

initBoards().catch(err=>{
  document.getElementById('turn-label').textContent=err.message;
  console.error(err);
});
</script>
</body>
</html>
